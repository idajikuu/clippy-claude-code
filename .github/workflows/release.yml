name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK3 and audio deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebp-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Stage release artifact
        run: |
          mkdir -p dist/clippy
          cp target/release/clippy dist/clippy/clippy
          cp -r packs public hooks README.md LICENSE dist/clippy/
          tar -czf clippy-linux-x86_64.tar.gz -C dist clippy

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: clippy-linux-x86_64
          path: clippy-linux-x86_64.tar.gz

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: clippy-linux-x86_64.tar.gz
          generate_release_notes: true
